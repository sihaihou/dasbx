<!DOCTYPE html>

<style type="text/css">
.body {

}
/*  中间的内容 */

/**登录表单*/

  //display:flex;

  //align-items:center;
}
.form {
  //padding-bottom: 10px;
}
.input {
  height: 48px;
}
.message{
  height: 10px;

  text-align: left;

}

.displayBlockClass{

}

  text-decoration: none;
  color: #2e77e5;
}
.page_accredit a:hover,
.page_accredit a:visited,
.page_accredit a:link,
.page_accredit a:active {

</style>
<script type="text/javascript" src="../js/jquery-3.2.1.js"></script>
<script type="text/javascript" src="../js/jQuery.md5.js"></script>
<script type="text/javascript" src="../js/crypto.js"></script>
<script type="text/javascript" src="../js/aes.js"></script>
<script type="text/javascript" src="../js/jsencrypt.min.js"></script>
<script type="text/javascript" src="../js/rsa.js"></script>
<script type="text/javascript" src="../js/reyco.js"></script>
<script type="text/javascript" src="../js/fingerprint2.js"></script>


<script type="text/javascript">
	const SYSTEM = {
	    //baseUrl: "http://www.dasbx.com/api",
	    baseUrl: "http://www.subixin.com/api",
	    deviceType: "PC",
	    codeName: "dasbx-code",
	    appId: "subixin",
	    get nonce() { return Utils.generateNonce();},
	    get deviceId() { return localStorage.getItem('deviceId'); },
	    get code() { return localStorage.getItem(this.codeName); },
	    set code(val) { localStorage.setItem(this.codeName, val); },
	    clearCode() { localStorage.removeItem(this.codeName); }
	};
	
	const Utils = {
		/* 根据参数名获取参数值*/
		getQueryString: (name) => {
			var reg = new RegExp("(^|&)" + name + "=([^&]*)(&|$)");
			var r = window.location.search.substr(1).match(reg);
			if (r != null)
				return unescape(r[2]);
			return null;
		},
		/* 参数签名*/
	    paramSign: (params) => {
		    let serialize = Utils.getSerialize(params);
		    return $.md5(serialize).toUpperCase();
		},
	    getSerialize: (params) => {
		    const map = Utils.getObjToMap(params);
		    let serialize = "";
		    if (map.size > 0) {
		        let keys = Object.keys(params)
		        keys.sort();
		        for (let i = 0; i < keys.length; i++) {
		            let key = keys[i];
		            serialize += key + "=" + map.get(key) + "&";
		        }
		    }
		    return serialize.substring(0, serialize.length - 1);
		},
	    getObjToMap: (object) => {
		    const map = new Map();
		    Object.entries(object).forEach(([key, value]) => {
		        map.set(key, value);
		    });
		    return map;
		},
	    /**
		 * 接口签名
		 * @param {*} config   
		 */
		sign: (config) => {
			const url = config.url.replace("/api", "")
		    const serialize = [config.method.toUpperCase(),url,config.dasbxTimestamp,config.dasbxNonce,config.dasbxContentSignature].join('|');
		    let salt = Utils.saltGenerator();
		    let source = salt+serialize;
		    return $.md5(source).toUpperCase();
		},
		/**
		 * 生成指定长度的随机纯文本字符串 (字母+数字)
		 * @param length 长度，默认 16 位
		 */
		 generateNonce: (length = 16) => {
		    const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789';
		    let result = '';
		    
		    // 使用更安全的浏览器加密随机数 API
		    const array = new Uint8Array(length);
		    window.crypto.getRandomValues(array);
		    
		    for (let i = 0; i < length; i++) {
		        // 取模运算，确保索引落在 chars 范围内
		        result += chars.charAt(array[i] % chars.length);
		    }
		    
		    return result;
		},
		/**
		 * salt
		 */
		saltGenerator: () => {
		    const _factor = [0x5f, 0x2d, 0x1a]; 

		    const _p1 = () => {
		        const _base = Math.pow(2, 4) - 6; 
		        return [0x64, 0x35, 0x61, 0x39].map(x => String.fromCharCode(x)).join('');
		    };
		    const _p2 = () => {
		        const _keys = [0x62, 0x32, 0x63, 0x38];
		        return _keys.reduce((acc, curr) => acc + String.fromCharCode(curr ^ (_factor[1] & 0x0)), "");
		    };
		    const _p3 = () => {
		        const _buf = (16315620).toString(16);
		        return [102, 49, 101, 52].map(c => String.fromCharCode(c)).join('');
		    };
		    const salt = () => {
		        const _p = _p1();
		        const _q = _p2();
		        const _r = _p3();
		        return `${_p}${_q}${_r}`;
		    };
		    return salt();
		},
		
		isMobile: () => {
		  const userAgentInfo = navigator.userAgent;
		  const mobileAgents = ['Android', 'iPhone', 'SymbianOS', 'Windows Phone', 'iPad', 'iPod'];
		  for (let i = 0; i < mobileAgents.length; i++) {
			if (userAgentInfo.indexOf(mobileAgents[i]) > 0) {
		      	return true;
		    }
		  }
		  return false;
		},
		/**
		 * 创建设备Id
		 */
		createFingerprint: () => {
		 	const fingerprint = Fingerprint2.get((components) => { 
		       const values = components.map(component => component.value);
		       const murmur = Fingerprint2.x64hash128(values.join(''), 31);
		       localStorage.setItem('deviceId', murmur);
		    });
		},
		 /**
		  *
		  */
	    showMessage: (message) => {
			$(".submit").css("margin-top","10px")
			$("#msg").removeClass("displayNoneClass");
			$("#msg").addClass("displayBlockClass");
			$("#message").html(message);
		},
		cleanMessage: () => {
			$(".submit").css("margin-top","20px")
			$("#msg").removeClass("displayBlockClass");
			$("#msg").addClass("displayNoneClass");
			$("#message").html("");
		}
	}
	
	const API = {
	    request: (method, url, params = {}, needCode = true, customHeaders = {}) => {
	        return new Promise((resolve, reject) => {
	            const code = needCode ? SYSTEM.code : null;
	            
	            const config = {
                    method, 
                    url: SYSTEM.baseUrl + url,
                    dasbxDeviceId: SYSTEM.deviceId,
                    dasbxDeviceType: SYSTEM.deviceType,
                    dasbxAccept: "false",
                    dasbxCode: code,
                    dasbxAppId: SYSTEM.appId,
                    dasbxNonce: SYSTEM.nonce,
                    dasbxTimestamp: Date.now(),
                    dasbxContentSignature: Utils.paramSign(params)
                };
	            const defaultHeaders = {
                    "dasbx-deviceId": config.dasbxDeviceId,
                    "dasbx-deviceType": config.dasbxDeviceType,
                    "dasbx-accept": config.dasbxAccept,
                    "dasbx-code": config.dasbxCode,
                    "dasbx-appId": config.dasbxAppId,
                    "dasbx-nonce": config.dasbxNonce,
                    "dasbx-timestamp": config.dasbxTimestamp,
                    "dasbx-content-signature": config.dasbxContentSignature,
                    "dasbx-Signature": Utils.sign(config)
                };
	            const headers = { ...defaultHeaders, ...customHeaders };
	            
	            $.ajax({
	                type: method, 
	                dataType: "json", 
	                url: config.url,
	                headers: headers, 
	                data: params,
	                success: resolve,
	                error: (xhr, status, error) => reject({ error, status })
	            });
	        });
	    }
	};
		            
	// 初始化
	$(function() {
		Utils.createFingerprint(); // 保持原函数
	    loadCode();
	    loadApplication();
	});	
		            
	// 业务函数
	async function loadCode() {
	    const res = await API.request("GET", "/login/sys/code", {
	        code: SYSTEM.code,
	        time: Date.now()
	    });
	    if (res.success && res.data) {
	    	SYSTEM.code = res.data;
	    }
	    return res;
	}	            
	/**
	*
	*/
	async function loadApplication() {
	    const clientId = Utils.getQueryString("client_id");
	    if (!clientId) return;
	    
	    const res = await API.request("GET", "/open/application/getByClientId", {
	        clientId, time: Date.now()
	    });
	    
	    if (res.success && res.data) {
	        $("#application").text(res.data.name).attr('href', res.data.domainUri);
	    }
	}

	async function login() {
	    const loginInfo = {
	        username: $("#username").val(),
	        password: CryptoJS.MD5($("#password").val()).toString()
	    };
		
	    const encryptedLoginInfo = await getEncryptedLoginInfo(loginInfo);
	    
	    console.log(encryptedLoginInfo)
	    const res = await API.request("POST", "/login/oauth2/login",
	    	{
		        redirect_uri: Utils.getQueryString("redirect_uri"),
		        t: encryptedLoginInfo.token,
		        time: Date.now()
	    	},
	    	true,
	    	{
	    		'dasbx-secret': encryptedLoginInfo.encryptedAesKey,
	            'dasbx-publicKey': encryptedLoginInfo.publicKey
	    	}
	    );
	    if (res.success && res.code !== "211") {
	        SYSTEM.clearCode();
	        await loadCode();
	        window.location.replace(res.data);
	    } else {
	        Utils.showMessage(res.dataMsg);
	    }
	}
	
	async function getEncryptedLoginInfo(loginInfo){
		// 获取AES密钥
		const aesSecretKey = await getAESSecretKey();
		//
		const sourceLoginInfoJson = JSON.stringify(loginInfo);
		// 加密登录信息
		const encryptedLoginInfoString = encryptAes(sourceLoginInfoJson,aesSecretKey);
		// 获取RSA公钥
		const publicKey = await getLoginPublicKey();
		// 用RSA加密AES密钥
		const encryptedAesKey = encryptRsa(aesSecretKey,publicKey);
		return {
	        publicKey: publicKey,
	        encryptedAesKey: encryptedAesKey,
	        token: encryptedLoginInfoString
	    };
	}
	/**
	 * 获取密钥
	 */
	async function getAESSecretKey(){
	    const res = await API.request("GET", "/login/sys/getSecret");
	    if (res.success && res.data) {
	       return res.data;
	    }
	}
	/**
	 * 获取公钥
	 */
	async function getLoginPublicKey(){
	    const res = await API.request("GET", "/login/sys/getPublicKey");
	    if (res.success && res.data) {
	       return res.data;
	    }
	}
	
</script>
</head>
<body>
	<div class="body">
		<div class="lay_top" id="layTop">
	      <div></div>
				<div class="lay_top_inner">
					<div class="lay_top_inner_logo"></div>
				</div>
	      <div></div>
		</div>
		<div class="lay_middle" id="layMiddle">
	      <div></div>
	      <div class="lay_middle_inner" id="layInner">
	        <div class="lay_middle_login">
	          <div class="tips">
	            <div class="title">密码登录</div>
	          </div>
	          <div class="login_form">
	            <form class="form">
	              <div class="input">
	                <div class="input1">
	                  <input id="username" class="username" placeholder="请输入用户名" onfocus="Utils.cleanMessage()"/>
	                </div>
	              </div>
	              <div class="input">
	                <div class="input1">
	                  <input id="password" type="password"  class="username" placeholder="请输入密码" onfocus="Utils.cleanMessage()"/>
	                </div>
	              </div>
	              <div id="msg" class="message displayNoneClass">
	                      <span class="warn-icon"><img src="http://oss.subixin.com/images/error_icon.png"/></span>
	                      <span id="message"></span>
	                    </div>
	              <div class="button">
	                <div>
	                  <input class="submit" onclick="login()" value="login"/>
	                </div>
	              </div>
	            </form>
	          </div>
	          <div class="guanjia">
	            <div class="guanjiaInfo">
	                  <div class="guanjiaInfo_login"><a href="http://www.subixin.com">Da爱登录</a></div>
	                    <div>|</div>
	                    <div><a href="http://open.subixin.com">授权管理</a></div>

	                <input type="checkbox" checked class="accreditInput" /> <label>全选
	                  <a id="application" href="http://open.subixin.com"></a>将获取以下权限：
	                </label>
	              </div>
	              <div class="lay_main_top1">
	                <input type="checkbox" disabled checked class="accreditInput" />
	                <label> 使用你的Dasbx头像、昵称信息 </label>
	              </div>
	            </div>
	            <div class="lay_main_bottom">
	              	授权即同意<a href="http://open.subixin.com">服务协议</a>和<a
	                href="http://open.subixin.com">隐私保护指引</a>
	            </div>
	          </div>
	        </div>
	      </div>
	      <div></div>
		</div>
	</div>
</body>
